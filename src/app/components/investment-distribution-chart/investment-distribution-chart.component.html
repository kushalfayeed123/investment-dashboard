<div class="w-full bg-white p-6 rounded-3xl border border-zinc-100 shadow-sm">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-[11px] font-black text-zinc-400 uppercase tracking-[0.2em]">
      Asset Allocation
    </h3>
    <span class="text-[10px] font-bold text-zinc-900 bg-zinc-100 px-2 py-0.5 rounded-md">
      Live Portfolio
    </span>
  </div>

  <div id="investmentDistributionChart" class="flex justify-center min-h-[350px]">
    <apx-chart 
      *ngIf="chartOptions && chartOptions.series"
      class="w-full"
      [series]="chartOptions.series!" 
      [chart]="chartOptions.chart!" 
      [labels]="chartOptions.labels!"
      [legend]="chartOptions.legend!" 
      [colors]="chartOptions.colors!" 
      [responsive]="chartOptions.responsive!"
      [plotOptions]="chartOptions.plotOptions!" 
      [stroke]="chartOptions.stroke!"
      [dataLabels]="chartOptions.dataLabels!">
    </apx-chart>
  </div>
</div>
