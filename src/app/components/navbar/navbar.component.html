<div class="flex h-screen bg-[#FDFCFB]">
  <button (click)="toggleSidebar()"
    class="md:hidden fixed top-5 right-5 z-50 p-3 bg-zinc-900 text-white rounded-2xl shadow-2xl">
    <svg *ngIf="!isSidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
    <svg *ngIf="isSidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>

  <aside [ngClass]="{ '-translate-x-full': !isSidebarOpen, 'translate-x-0': isSidebarOpen }"
    class="fixed inset-y-0 left-0 transform transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] w-80 bg-zinc-950 z-40 md:relative md:translate-x-0 flex flex-col shadow-[20px_0_50px_rgba(0,0,0,0.2)]">

    <div class="px-8 py-10">
      <div class="flex items-center gap-4 group cursor-pointer">
        <div
          class="w-12 h-12 bg-gradient-to-tr from-[#590202] to-[#a61103] rounded-2xl flex items-center justify-center shadow-lg shadow-red-900/20 group-hover:scale-110 transition-transform">
          <img src="./assets/images/chrissain-logo.png" alt="Logo" class="w-7 h-7 object-contain brightness-0 invert" />
        </div>
        <div>
          <h1 class="text-white font-bold text-xl tracking-tight leading-none">CHRISSAIN</h1>
          <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-1">Premium Finance</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-4 space-y-10 overflow-y-auto overflow-x-hidden scroll-smooth custom-scrollbar pb-10">
      <div *ngIf="role === 'user'">
        <h3 class="px-4 text-[11px] font-bold text-zinc-600 uppercase tracking-widest mb-4">Core Wallet</h3>
        <div class="space-y-1">
          <a routerLink="/dashboard" routerLinkActive="bg-zinc-900 text-white shadow-sm"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 12l2-2m0 0l7-7 7 7M13 5v6h6" />
            </svg>
            <span class="font-medium text-sm">Main Terminal</span>
          </a>
          <a routerLink="/deposit" routerLinkActive="bg-zinc-900 text-white"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4" />
            </svg>
            <span class="font-medium text-sm">Deposit Assets</span>
          </a>
          <a routerLink="/withdraw" routerLinkActive="bg-zinc-900 text-white"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span class="font-medium text-sm">Withdraw Funds</span>
          </a>
        </div>
      </div>

      <div>
        <h3 class="px-4 text-[11px] font-bold text-zinc-600 uppercase tracking-widest mb-4">Activity & Reporting</h3>
        <div class="space-y-1">
          <a routerLink="/history" routerLinkActive="bg-zinc-900 text-white"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span class="font-medium text-sm">Ledger History</span>
          </a>
          <!-- <a routerLink="/investments"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
            <span class="font-medium text-sm">Market Growth</span>
          </a>
          <a routerLink="/referrals"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <span class="font-medium text-sm">Affiliates</span>
          </a> -->
        </div>
      </div>

      <div *ngIf="role === 'admin'">
        <h3 class="px-4 text-[11px] font-bold text-[#a61103] uppercase tracking-widest mb-4">Control Center</h3>
        <div class="space-y-1">
          <a routerLink="/admin" routerLinkActive="bg-zinc-900 text-white"
            class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-xl transition-all group">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            </svg>
            <span class="font-medium text-sm">User Management</span>
          </a>
        </div>
      </div>
    </nav>

    <div class="p-6 bg-zinc-900/50 mt-auto">
      <div class="bg-zinc-900 rounded-2xl p-4 border border-white/5">
        <div class="flex items-center gap-3 mb-4">
          <div
            class="w-10 h-10 rounded-full bg-gradient-to-tr from-zinc-700 to-zinc-800 flex items-center justify-center text-xs font-bold text-white border border-white/10">
            {{ role === 'admin' ? 'AD' : 'US' }}
          </div>
          <div class="overflow-hidden">
            <p class="text-white text-xs font-bold truncate capitalize">{{ role }} Account</p>
            <p class="text-zinc-500 text-[10px] truncate">Secure Connection</p>
          </div>
        </div>
        <button (click)="logout()"
          class="w-full py-2.5 bg-[#590202] hover:bg-[#a61103] text-white text-xs font-bold rounded-xl transition-all active:scale-95 shadow-lg shadow-red-900/20">
          Sign Out
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-auto">
    <header
      class="h-20 border-b border-zinc-100 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md sticky top-0 z-30">
      <h2 class="text-zinc-800 font-semibold text-sm">Network Status: <span
          class="text-green-500 font-bold underline decoration-2 underline-offset-4">Stable</span></h2>
      <div class="flex items-center gap-6">
        <button class="text-zinc-400 hover:text-zinc-800 transition-colors relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span class="absolute top-0 right-0 w-2 h-2 bg-red-600 rounded-full border-2 border-white"></span>
        </button>
        <div class="w-px h-6 bg-zinc-200"></div>
        <span class="text-zinc-800 font-bold text-sm tracking-tight">{{ role | uppercase }}</span>
      </div>
    </header>

    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
