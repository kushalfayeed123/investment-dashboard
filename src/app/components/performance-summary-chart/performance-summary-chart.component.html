<div class="w-full bg-white p-6 rounded-3xl border border-zinc-100 shadow-sm">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-[11px] font-black text-zinc-400 uppercase tracking-[0.2em]">Risk/Reward Summary</h3>
    <svg class="w-4 h-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
  </div>

  <div id="chart" class="w-full overflow-hidden">
    <apx-chart
      *ngIf="chartOptions.series"
      [series]="chartOptions.series"
      [chart]="chartOptions.chart!"
      [xaxis]="chartOptions.xaxis!"
      [yaxis]="chartOptions.yaxis!"
      [colors]="chartOptions.colors!"
      [plotOptions]="chartOptions.plotOptions!"
      [dataLabels]="chartOptions.dataLabels!"
      [responsive]="chartOptions.responsive!">
    </apx-chart>
  </div>
</div>
